name: Release

on:
  push:
    tags:
      # Proper semver: v1.2.3, v1.2.3-beta.1, v1.2.3-rc.4 etc.
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

# Write access is needed so electron-builder (via GITHUB_TOKEN) can
# create/update the GitHub Release that hosts the installer artifacts.
permissions:
  contents: write

jobs:
  release:
    runs-on: ${{ matrix.os }}
    # Generous budget — sidecar compile on linux + notarization can take a while.
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win
          - os: ubuntu-latest
            platform: linux

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      # Ubuntu runner lacks cmake by default; whisper.cpp is built from source
      # there. macOS runners ship with cmake (via Xcode CLT); Windows uses the
      # pre-built whisper binary from the sidecar manifest (no cmake needed).
      - name: Install cmake + build deps (linux)
        if: matrix.platform == 'linux'
        run: sudo apt-get update && sudo apt-get install -y cmake build-essential

      - name: Install dependencies
        run: npm ci

      - name: Fetch sidecar binaries
        run: npm run fetch:sidecars

      - name: Generate app icon
        run: npm run gen:icon

      - name: Build renderer + main
        run: npm run build

      # ─── per-platform package + publish ────────────────────────────────
      # Each platform has its own step so we can (a) scope signing env vars
      # to the matching OS and (b) unset empty secrets before electron-builder
      # sees them — otherwise it treats empty-string CSC_LINK as a filepath
      # and crashes resolving an empty path.

      - name: Package + publish (mac)
        if: matrix.platform == 'mac'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          CSC_NAME: ${{ secrets.CSC_NAME }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          for v in CSC_LINK CSC_KEY_PASSWORD CSC_NAME APPLE_ID APPLE_APP_SPECIFIC_PASSWORD APPLE_TEAM_ID; do
            if [ -z "${!v}" ]; then unset "$v"; fi
          done
          npx electron-builder --mac --arm64 --x64 --publish always

      - name: Package + publish (win)
        if: matrix.platform == 'win'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
        run: |
          for v in WIN_CSC_LINK WIN_CSC_KEY_PASSWORD; do
            if [ -z "${!v}" ]; then unset "$v"; fi
          done
          npx electron-builder --win --publish always

      - name: Package + publish (linux)
        if: matrix.platform == 'linux'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --linux --publish always
