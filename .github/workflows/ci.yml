name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: # allow manual runs from the Actions tab

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege: the CI job only needs to read the repo.
permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # postinstall rebuilt better-sqlite3 for Electron's ABI; vitest runs
      # against Node's ABI, so rebuild back before tests.
      - name: Rebuild native modules for Node
        run: npm rebuild better-sqlite3

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
