appId: dev.local.vinu
productName: vinu
directories:
  output: release
  buildResources: build
files:
  - out/**
  - package.json
  - "!node_modules/**/test/**"
  - "!node_modules/**/*.md"
asarUnpack:
  - "**/*.{node,dll}"
  - "node_modules/better-sqlite3/**"
extraResources:
  - from: resources/bin
    to: bin
    filter: ["**/*"]
mac:
  category: public.app-category.productivity
  target:
    - target: dmg
      arch: [arm64, x64]
  hardenedRuntime: true
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
win:
  target: nsis
linux:
  target: [AppImage, deb]
  category: Utility
npmRebuild: true
